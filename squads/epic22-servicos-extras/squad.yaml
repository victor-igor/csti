name: epic22-servicos-extras
version: "1.0.0"
short-title: "Epic 22 — Serviços Extras na Evolução de Sessão"
description: |
  Squad de execução do Epic 22. Organiza os agentes AIOX responsáveis por
  implementar o fluxo de serviços extras na evolução de sessão — RPC backend
  segura, view de preços, UI inline no modal de evolução, QA e deploy.
author: "victor-igor"
license: private
slashPrefix: "epic22"

aios:
  minVersion: "4.0.0"
  type: squad

tags:
  - epic22
  - reabilitacao
  - agendamentos
  - evolucao-sessao
  - supabase
  - react

# ─────────────────────────────────────────────
# MAPA DE RESPONSABILIDADES POR STORY/TASK
# ─────────────────────────────────────────────
#
# STORY 22.1 — Backend RPC
#   T1: @data-engineer  — Verificar cobertura do trigger (PRIMEIRO)
#   T2: @data-engineer  — Migration RPC + validações de segurança
#   T3: @data-engineer  — View v_agendamentos_com_preco
#   T4: @data-engineer  — Índice em sales_package_item_id
#   T5: @dev            — Fix getSessionAppointments (deleted_at)
#   T6: @dev            — Tipos TypeScript (AdicionarServicoExtraPayload)
#   QA: @qa             — Gate 22.1
#
# STORY 22.2 — Frontend UI
#   T1: @dev            — Query catálogo de serviços
#   T2: @dev            — Query pacotes ativos + itens do pacote
#   T3: @dev            — Estado do mini-form
#   T4: @dev            — Handler handleAddExtra()
#   T5: @dev            — UI mini-form inline
#   T6: @dev            — refreshSessionAppointments no hook
#   T7: @dev            — Cleanup props desnecessárias
#   QA: @qa             — Gate 22.2
#
# DEPLOY:
#   @devops             — git push + PR após QA PASS em ambas stories
#
# REVISÃO ESTRATÉGICA (já concluída):
#   @architect (Aria)   — Análise de viabilidade arquitetural ✅
#   CTO Architect       — ADR + segurança + escalabilidade ✅
#   Data Chief (Datum)  — Modelo de dados + view ✅
# ─────────────────────────────────────────────

components:
  agents:
    - data-engineer.md
    - dev.md
    - qa.md
    - devops.md

  tasks:
    - t1-verificar-trigger.md
    - t2-migration-rpc.md
    - t3-view-precos.md
    - t4-indice-sales-package.md
    - t5-fix-deleted-at.md
    - t6-tipos-typescript.md
    - t7-ui-servico-extra.md
    - t8-qa-gate-221.md
    - t9-qa-gate-222.md
    - t10-deploy.md

  workflows:
    - wf-epic22-execution.yaml

config:
  story_221: "docs/stories/22.1.story.md"
  story_222: "docs/stories/22.2.story.md"
  execution_order: sequential  # 22.1 completa antes de 22.2 iniciar
  dependency_gate: "22.1 QA PASS → unlock 22.2"
